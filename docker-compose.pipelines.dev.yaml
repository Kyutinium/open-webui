# Pipelines dev service for Open WebUI
# Usage: docker compose -f docker-compose.pipelines.dev.yaml up -d
#
# Mount local ./pipelines directory into the container so pipe files
# are picked up automatically. Edit .env or pass env vars to configure.

services:
  pipelines-dev:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines-dev
    ports:
      - ${PIPELINES_PORT:-9098}:9099
    volumes:
      - ./pipelines:/app/pipelines
    environment:
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
